<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura AI Chat — Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --demo-bg: #1e1e1e;
            --demo-surface: #252526;
            --demo-border: #3e3e42;
            --demo-text: #cccccc;
            --demo-text-muted: #858585;
            --demo-primary: #7c6af7;
            --demo-font: 'DM Sans', system-ui, sans-serif;
        }

        body.light {
            --demo-bg: #f0f2f5;
            --demo-surface: #ffffff;
            --demo-border: #e0e3ea;
            --demo-text: #1a1d27;
            --demo-text-muted: #6b7280;
            --demo-primary: #6350e9;
            --demo-input-bg: rgba(0, 0, 0, 0.04);
            --demo-hover-bg: rgba(0, 0, 0, 0.03);
        }

        body.professional-light {
            --demo-bg: #f4f7fa;
            --demo-surface: #ffffff;
            --demo-border: #dae1e7;
            --demo-text: #2c3e50;
            --demo-text-muted: #7f8c8d;
            --demo-primary: #187ABA;
            --demo-input-bg: #f8f9f9;
            --demo-hover-bg: #f0f2f2;
        }

        :root {
            --demo-input-bg: rgba(255, 255, 255, 0.06);
            --demo-hover-bg: rgba(255, 255, 255, 0.05);
        }

        html,
        body {
            height: 100%;
            width: 100%;
            font-family: var(--demo-font);
            background: var(--demo-bg);
            color: var(--demo-text);
            overflow: hidden;
        }

        /* ── Three-panel layout ──────────────────────────────── */

        .demo-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ── Left Sidebar ────────────────────────────────────── */

        .sidebar-left {
            width: 320px;
            min-width: 260px;
            max-width: 500px;
            background: var(--demo-surface);
            border-right: 1px solid var(--demo-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Drag Handles ────────────────────────────────────── */

        .drag-handle {
            width: 4px;
            background: transparent;
            cursor: col-resize;
            transition: background 0.2s;
            z-index: 10;
            flex-shrink: 0;
            position: relative;
        }

        .drag-handle:hover,
        .drag-handle.active {
            background: var(--demo-primary);
        }

        .drag-handle::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: -2px;
            right: -2px;
        }

        .sidebar-header {
            padding: 14px 16px 12px;
            border-bottom: 1px solid var(--demo-border);
        }

        .sidebar-title {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-version {
            font-size: 10px;
            font-weight: 500;
            color: var(--demo-text-muted);
            background: rgba(124, 106, 247, 0.1);
            padding: 1px 7px;
            border-radius: 5px;
        }

        .sidebar-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
        }

        .theme-select {
            padding: 4px 8px;
            border: 1px solid var(--demo-border);
            border-radius: 6px;
            background: var(--demo-surface);
            color: var(--demo-text);
            font-size: 11px;
            font-family: var(--demo-font);
            cursor: pointer;
            outline: none;
            flex-shrink: 0;
        }

        .theme-select:hover {
            border-color: var(--demo-primary);
        }

        .toggle-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border: 1px solid var(--demo-border);
            border-radius: 6px;
            background: transparent;
            color: var(--demo-text-muted);
            font-size: 11px;
            cursor: pointer;
            font-family: var(--demo-font);
            transition: all 0.12s;
        }

        .toggle-btn:hover {
            border-color: var(--demo-primary);
            color: var(--demo-text);
        }

        .toggle-btn.active {
            background: rgba(124, 106, 247, 0.12);
            border-color: var(--demo-primary);
            color: var(--demo-primary);
        }

        .toggle-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--demo-border);
            transition: background 0.12s;
        }

        .toggle-btn.active .toggle-indicator {
            background: var(--demo-primary);
        }

        .sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        /* ── Setting groups ──────────────────────────────────── */

        .setting-group {
            border: 1px solid var(--demo-border);
            border-radius: 8px;
            margin-bottom: 6px;
            overflow: hidden;
        }

        .setting-group-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 10px;
            cursor: pointer;
            user-select: none;
            background: var(--demo-hover-bg);
            transition: background 0.1s;
        }

        .setting-group-header:hover {
            background: var(--demo-hover-bg);
        }

        .setting-chevron {
            font-size: 9px;
            color: var(--demo-text-muted);
            transition: transform 0.15s;
        }

        .setting-chevron.open {
            transform: rotate(90deg);
        }

        .setting-group-title {
            font-size: 12px;
            font-weight: 600;
        }

        .setting-group-body {
            display: none;
            padding: 6px 10px 10px;
        }

        .setting-group-body.open {
            display: block;
        }

        /* ── Fields ───────────────────────────────────────────── */

        .field {
            margin-bottom: 6px;
        }

        .field:last-child {
            margin-bottom: 0;
        }

        .field-label {
            font-size: 10px;
            font-weight: 500;
            color: var(--demo-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .field input,
        .field textarea,
        .field select {
            width: 100%;
            padding: 5px 8px;
            border: 1px solid var(--demo-border);
            border-radius: 5px;
            background: var(--demo-input-bg);
            color: var(--demo-text);
            font-size: 12px;
            font-family: var(--demo-font);
            outline: none;
            transition: border-color 0.15s;
        }

        .field input:focus,
        .field textarea:focus {
            border-color: var(--demo-primary);
        }

        .field textarea {
            resize: vertical;
            min-height: 48px;
        }

        .field-range {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .field-range input[type="range"] {
            flex: 1;
            accent-color: var(--demo-primary);
        }

        .field-range .range-val {
            font-size: 12px;
            color: var(--demo-text-muted);
            min-width: 28px;
            text-align: right;
        }

        /* Checkbox items */
        .check-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
            font-size: 13px;
        }

        .check-item input[type="checkbox"] {
            accent-color: var(--demo-primary);
            width: 14px;
            height: 14px;
        }

        /* ── Apply button ─────────────────────────────────────── */

        .sidebar-footer {
            padding: 8px;
            border-top: 1px solid var(--demo-border);
        }

        .apply-btn {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 8px;
            background: var(--demo-primary);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--demo-font);
            transition: all 0.15s;
        }

        .apply-btn:hover {
            filter: brightness(1.12);
        }

        .apply-btn:active {
            transform: scale(0.98);
        }

        /* ── Center ──────────────────────────────────────────── */

        .center-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            min-width: 0;
        }

        .widget-container {
            width: 100%;
            height: 100%;
            max-width: 600px;
            max-height: 100%;
            transition: all 0.3s ease;
        }

        .widget-container.full {
            max-width: 100%;
        }

        aura-chat {
            width: 100%;
            height: 100%;
        }

        /* ── Right Sidebar (Event Log) ────────────────────────── */

        .sidebar-right {
            width: 300px;
            min-width: 220px;
            max-width: 500px;
            background: var(--demo-surface);
            border-left: 1px solid var(--demo-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-right.hidden {
            display: none;
        }

        .event-header {
            padding: 16px;
            border-bottom: 1px solid var(--demo-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .event-title {
            font-size: 14px;
            font-weight: 600;
        }

        .clear-btn {
            padding: 4px 10px;
            border: 1px solid var(--demo-border);
            border-radius: 6px;
            background: transparent;
            color: var(--demo-text-muted);
            font-size: 11px;
            cursor: pointer;
            font-family: var(--demo-font);
            transition: all 0.15s;
        }

        .clear-btn:hover {
            border-color: var(--demo-primary);
            color: var(--demo-text);
        }

        .event-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .event-item {
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 4px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--demo-border);
            cursor: pointer;
            transition: background 0.1s;
        }

        .event-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .event-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .event-time {
            font-size: 10px;
            color: var(--demo-text-muted);
            font-family: 'Fira Code', monospace;
        }

        .event-badge {
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .event-badge.user {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .event-badge.ai {
            background: rgba(124, 106, 247, 0.15);
            color: #a78bfa;
        }

        .event-badge.widget {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }

        .event-badge.error {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .event-payload {
            display: none;
            margin-top: 6px;
            padding: 6px 8px;
            background: var(--demo-input-bg);
            border-radius: 6px;
            font-size: 11px;
            line-height: 1.5;
            font-family: 'Fira Code', monospace;
            color: var(--demo-text-muted);
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }

        .event-item.expanded .event-payload {
            display: block;
        }
    </style>
</head>

<body class="light">
    <div class="demo-layout">
        <!-- ═══ LEFT SIDEBAR ═══ -->
        <div class="sidebar-left" id="sidebarLeft">
            <div class="sidebar-header">
                <div class="sidebar-title">
                    ✦ Aura AI Chat <span class="sidebar-version">v1.0.0</span>
                </div>
                <div class="sidebar-controls">
                    <select class="theme-select" id="themeSelect">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                        <option value="professional-light" selected>Professional</option>
                    </select>
                    <button class="toggle-btn active" id="toggleFullSize">
                        <span class="toggle-indicator"></span> Full
                    </button>
                    <button class="toggle-btn active" id="toggleEventLog">
                        <span class="toggle-indicator"></span> Log
                    </button>
                </div>
            </div>
            <div class="sidebar-body" id="settingsBody">
                <!-- Settings groups rendered by JS -->
            </div>
            <div class="sidebar-footer">
                <button class="apply-btn" id="applyBtn">Apply to widget</button>
            </div>
        </div>

        <div class="drag-handle" id="dragLeft"></div>

        <!-- ═══ CENTER ═══ -->
        <div class="center-panel">
            <div class="widget-container full" id="widgetContainer">
                <aura-chat id="widget"></aura-chat>
            </div>
        </div>

        <div class="drag-handle" id="dragRight"></div>

        <!-- ═══ RIGHT SIDEBAR (Event Log) ═══ -->
        <div class="sidebar-right" id="eventLogPanel">
            <div class="event-header">
                <span class="event-title">Event Log</span>
                <button class="clear-btn" id="clearEvents">Clear</button>
            </div>
            <div class="event-list" id="eventList"></div>
        </div>
    </div>

    <script type="module" src="./main.ts"></script>
</body>

</html>
